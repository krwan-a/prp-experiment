<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听觉语义干扰对双任务中枢加工资源的影响</title>
<style>
  /* ======== 全局重置 ======== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: #fff;
    font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ======== 实验容器 ======== */
  #experiment {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; justify-content: center; align-items: center;
  }

  /* ======== 文本屏幕（指导语/说明/结束） ======== */
  #text-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
    z-index: 100;
    background: #000;
  }
  #text-screen .content {
    max-width: 800px;
    max-height: 70vh;
    font-size: 24px;
    line-height: 1.8;
    text-align: left;
    white-space: pre-wrap;
    color: #eee;
    overflow-y: auto;
    padding: 10px;
  }
  #text-screen .hint {
    margin-top: 40px;
    font-size: 20px;
    color: #999;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 1.0; }
  }

  /* ======== 刺激呈现层 ======== */
  #stimulus-layer {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 50;
    pointer-events: none;
  }

  .stimulus {
    position: absolute;
    display: none;
  }
  .stimulus.visible { display: block; }

  /* 注视点 */
  #fixation {
    font-size: 80px;
    color: #fff;
    font-weight: bold;
  }

  /* T1: 字母矩阵 - 屏幕上半部居中 */
  #t1-stim {
    position: absolute;
    left: 50%;
    top: 30%;
    transform: translate(-50%, -50%);
    width: 280px;
    height: 280px;
    object-fit: contain;
  }

  /* T2: 数字 - 矩阵下方 */
  #t2-stim {
    position: absolute;
    left: 50%;
    top: 72%;
    transform: translate(-50%, -50%);
    width: 280px;
    height: 280px;
    object-fit: contain;
  }

  /* ======== 白色反应屏（刺激消失后） ======== */
  #response-screen {
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 900;
    display: none;
  }
  #response-screen.active { display: block; }

  /* ======== 练习反馈文字 ======== */
  #feedback-text {
    position: absolute;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    font-size: 48px;
    z-index: 80;
    background: #000;
    pointer-events: none;
  }
  #feedback-text.active { display: flex; }
  #feedback-text.correct { color: #4caf50; }
  #feedback-text.wrong { color: #f44336; }

  /* ======== 底部状态栏 ======== */
  #status-bar {
    position: absolute;
    bottom: 30px;
    left: 0; right: 0;
    text-align: center;
    font-size: 20px;
    color: #666;
    z-index: 60;
    pointer-events: none;
  }

  /* ======== 手机端触屏按键 ======== */
  #touch-buttons {
    position: absolute;
    bottom: 100px;
    left: 0; right: 0;
    display: none;
    justify-content: center;
    gap: 20px;
    z-index: 200;
    padding: 0 20px;
  }
  #touch-buttons.active { display: flex; }

  .touch-btn {
    padding: 18px 36px;
    font-size: 22px;
    font-weight: bold;
    border: 2px solid #888;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    cursor: pointer;
    touch-action: manipulation;
    min-width: 100px;
    text-align: center;
  }
  .touch-btn:active { background: rgba(255,255,255,0.3); }
  .touch-btn .label {
    display: block;
    font-size: 13px;
    color: #aaa;
    font-weight: normal;
    margin-top: 4px;
  }
  .touch-btn.t1-btn { border-color: #5a9; }
  .touch-btn.t2-btn { border-color: #a95; }

  /* ======== 进度条 ======== */
  #progress-container {
    display: none;
  }

  /* ======== 响应式适配 ======== */
  @media (max-width: 768px) {
    #text-screen .content { font-size: 18px; padding: 20px; }
    #text-screen .hint   { font-size: 16px; }
    #t1-stim { width: 200px; height: 200px; left: 50%; top: 28%; }
    #t2-stim { width: 200px; height: 200px; left: 50%; top: 72%; }
    .touch-btn { padding: 14px 24px; font-size: 18px; min-width: 80px; }
    #status-bar { font-size: 16px; bottom: 170px; }
    #feedback-text { font-size: 32px; }
  }
  @media (max-width: 480px) {
    #text-screen .content { font-size: 15px; }
    #t1-stim { width: 160px; height: 160px; left: 50%; top: 26%; }
    #t2-stim { width: 160px; height: 160px; left: 50%; top: 74%; }
    .touch-btn { padding: 12px 18px; font-size: 16px; min-width: 65px; }
    #feedback-text { font-size: 24px; }
  }

  /* ======== 被试信息对话框 ======== */
  #info-dialog {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
  }
  #info-dialog.hidden { display: none; }
  #info-dialog .box {
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 16px;
    padding: 50px 60px;
    max-width: 420px;
    width: 90%;
  }
  #info-dialog h2 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 30px;
    color: #eee;
    font-weight: normal;
  }
  #info-dialog .field {
    margin-bottom: 20px;
  }
  #info-dialog .field label {
    display: block;
    font-size: 16px;
    color: #aaa;
    margin-bottom: 6px;
  }
  #info-dialog .field input,
  #info-dialog .field select {
    width: 100%;
    padding: 12px 16px;
    font-size: 18px;
    background: #2a2a2a;
    border: 1px solid #555;
    border-radius: 8px;
    color: #fff;
    outline: none;
    box-sizing: border-box;
  }
  #info-dialog .field input:focus,
  #info-dialog .field select:focus {
    border-color: #7af;
  }
  #info-dialog .field select {
    appearance: auto;
  }
  #info-dialog .btn-start {
    width: 100%;
    padding: 14px;
    font-size: 20px;
    background: #3a7bd5;
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    margin-top: 10px;
  }
  #info-dialog .btn-start:hover {
    background: #4a8be5;
  }
  #info-dialog .btn-start:disabled {
    background: #555;
    cursor: not-allowed;
  }
</style>

<body>

<script>
// ═════════════════════════════════════════════════════════════════════
//  第1部分：实验配置
// ═════════════════════════════════════════════════════════════════════

const CONFIG = {
  ASSETS_BASE: 'assets',

  SOA_LEVELS: [50, 150, 500],             // ms
  AUDIO_TYPES: ['white_noise', 'speech'],
  STIM_DURATION_T1: 350,                  // T1字母矩阵 350ms
  STIM_DURATION_T2: 350,                  // T2数字 350ms
  FIX_MIN: 500, FIX_MAX: 1000,            // 注视点抖动范围 ms
  ITI: 200,                                // 试次间隔 ms
  RESPONSE_TIMEOUT: 2300,                  // 反应超时 2300ms（从T1 onset计）
  PRACTICE_TRIALS: 12,
  TRIALS_PER_CONDITION: 30,

  // 按键映射（两个任务都用F/J，按顺序区分）
  KEYS: {
    T1_PRESENT: 'f',    // 有T → F
    T1_ABSENT:  'j',    // 无T → J
    T2_ODD:     'f',    // 奇数 → F
    T2_EVEN:    'j',    // 偶数 → J
    CONTINUE:   ' ',
  },

  // 指导语
  INSTRUCTION: [
    '欢迎参加本实验。\n\n',
    '本实验包含两个视觉任务，两个任务同等重要。\n\n',
    '任务一：屏幕上方会出现一个 3×3 的字母矩阵，请判断矩阵中是否包含字母 T。\n',
    '  · 含有 T → 按【F】键\n',
    '  · 不含 T → 按【J】键\n\n',
    '任务二：屏幕下方会出现一个数字，请判断该数字的奇偶性。\n',
    '  · 奇数 → 按【F】键\n',
    '  · 偶数 → 按【J】键\n\n',
    '注意事项：\n',
    '1. 两个任务【都使用 F 和 J 键】，请严格按照顺序：\n',
    '   【先按 F/J 回答矩阵（任务一），再按 F/J 回答数字（任务二）】\n',
    '   任务一的反应必须在任务二的反应之前完成，不能颠倒顺序；\n',
    '2. 全程忽略耳机中的背景声音，无需对声音做任何反应；\n',
    '3. 看到每个刺激后请立即按键，不要等待；\n',
    '4. 两个任务同等重要，对两个任务都要做到既准确又快速的反应。\n\n',
    '实验共分两部分，中途有休息。每部分约需 3 分钟。\n\n',
    '如有疑问，请在实验开始前告知主试。\n\n',
    '准备好后，按空格键开始练习阶段。\n',
  ].join(''),

  PRACTICE_INSTRUCTION: [
    '现在进入练习阶段，共 12 个试次，帮助你熟悉操作流程。\n\n',
    '练习阶段不播放背景音频，正确完成后方可进入正式实验。\n\n',
    '流程提示：\n',
    '  · "+"注视点 → 上方字母矩阵出现（先按 F/J 判断T）\n',
    '  · → 下方数字出现（再按 F/J 判断奇偶）\n',
    '  · 必须按顺序：先任务一，再任务二。\n',
    '  · 每次反应后会看到对错反馈。\n\n',
    '如有不明白的地方，现在可以询问主试。\n\n',
    '按空格键开始练习。\n',
  ].join(''),

  PRACTICE_DONE: [
    '练习完成！\n\n',
    '即将开始正式实验（共两部分，中间有休息）。\n\n',
    '始终保持：\n',
    '  · 见刺激立即按键\n',
    '  · 忽略背景声音\n\n',
    '按【空格键】继续。\n',
  ].join(''),

  BREAK_MSG: [
    '休息时间 ~\n\n',
    '请放松眼睛，稍作休息。\n\n',
    '准备好后按【空格键】继续。\n',
  ].join(''),

  END_MSG: [
    '实验全部结束！\n\n',
    '感谢您的参与。\n\n',
    '数据已保存，您可以关闭页面。\n',
  ].join(''),
};


// ═════════════════════════════════════════════════════════════════════
//  第2部分：DOM 引用与工具函数
// ═════════════════════════════════════════════════════════════════════

const $ = id => document.getElementById(id);
const el = {
  textScreen: $('text-screen'),
  textContent: $('text-content'),
  textHint: $('text-hint'),
  stimulusLayer: $('stimulus-layer'),
  fixation: $('fixation'),
  t1: $('t1-stim'),
  t2: $('t2-stim'),
  statusBar: $('status-bar'),
  touchBtns: $('touch-buttons'),
  responseScreen: $('response-screen'),
  feedbackText: $('feedback-text'),
};

/** 等待指定毫秒 */
function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

/** 隐藏所有刺激 */
function hideAllStimuli() {
  el.fixation.classList.remove('visible');
  el.t1.classList.remove('visible');
  el.t2.classList.remove('visible');
}

/** 显示指定的刺激 */
function show(elmt) { elmt.classList.add('visible'); }
function hide(elmt) { elmt.classList.remove('visible'); }

/** 设置 T1 图片 */
function setT1Image(path) {
  el.t1.src = path;
  el.t1.onerror = () => { el.t1.src = ''; console.warn('T1图片加载失败:', path); };
}

/** 设置 T2 图片 */
function setT2Image(path) {
  el.t2.src = path;
  el.t2.onerror = () => { el.t2.src = ''; console.warn('T2图片加载失败:', path); };
}


// ═════════════════════════════════════════════════════════════════════
//  第3部分：反应收集器
// ═════════════════════════════════════════════════════════════════════

class ResponseCollector {
  constructor(maxWaitMs) {
    this.maxWait = maxWaitMs;
    this.t1 = null;            // { key, rt }
    this.t2 = null;            // { key, rt }
    this.t1Onset = null;
    this.t2Onset = null;
    this._firstDone = false;   // 第一按(F/J)已收到 → 任务一
    this._resolve = null;
    this._handler = null;
    this._timer = null;
    this._touchHandler = null;
  }

  start(t1Onset) {
    this.t1Onset = t1Onset;
    this.t1 = null; this.t2 = null;
    this.t2Onset = null;
    this._firstDone = false;

    return new Promise(resolve => {
      this._resolve = resolve;

      // 键盘：两个任务都用 F/J，靠顺序区分
      this._handler = e => {
        if (e.repeat) return;
        if (e.key !== 'f' && e.key !== 'j') return;
        const now = performance.now();

        if (!this._firstDone) {
          // 第一按 F/J → 任务一
          this._firstDone = true;
          this.t1 = { key: e.key, rt: Math.round(now - this.t1Onset) };
        } else if (this.t2Onset) {
          // 第二按 F/J（且在T2出现后）→ 任务二
          this.t2 = { key: e.key, rt: Math.round(now - this.t2Onset) };
          this._finish();
        }
        // 第二按在T2出现前 → 忽略（被试需等待T2再按）
      };
      document.addEventListener('keydown', this._handler);

      // 触屏按钮
      this._touchHandler = e => {
        const btn = e.currentTarget;
        const now = performance.now();
        const key = btn.dataset.key;

        if (!this._firstDone) {
          this._firstDone = true;
          this.t1 = { key, rt: Math.round(now - this.t1Onset) };
        } else if (this.t2Onset) {
          this.t2 = { key, rt: Math.round(now - this.t2Onset) };
          this._finish();
        }
      };
      document.querySelectorAll('.touch-btn').forEach(b => {
        b.addEventListener('click', this._touchHandler);
      });

      el.touchBtns.classList.add('active');

      // 超时
      this._timer = setTimeout(() => this._finish(), this.maxWait);
    });
  }

  setT2Onset(t2Onset) {
    this.t2Onset = t2Onset;
  }

  _finish() {
    if (this._timer) clearTimeout(this._timer);
    document.removeEventListener('keydown', this._handler);
    document.querySelectorAll('.touch-btn').forEach(b => {
      b.removeEventListener('click', this._touchHandler);
    });
    el.touchBtns.classList.remove('active');
    if (this._resolve) this._resolve({ t1: this.t1, t2: this.t2 });
  }
}


// ═════════════════════════════════════════════════════════════════════
//  第4部分：音频控制
// ═════════════════════════════════════════════════════════════════════

const AudioController = {
  _current: null,
  _elements: {},

  init() {
    // 预创建 audio 元素
    for (const type of ['white_noise', 'speech']) {
      const audio = new Audio();
      audio.loop = true;
      audio.volume = 0.5;
      audio.preload = 'auto';
      this._elements[type] = audio;
    }
    this._elements.white_noise.src = `${CONFIG.ASSETS_BASE}/audio/白噪音.mp3`;
    this._elements.speech.src = `${CONFIG.ASSETS_BASE}/audio/无序母语单字语音.mp3`;
  },

  async play(type) {
    this.stop();
    const audio = this._elements[type];
    if (!audio) return;
    try {
      audio.currentTime = 0;
      await audio.play();
      this._current = audio;
    } catch (e) {
      console.warn('音频播放失败（浏览器自动播放策略）:', e.message);
    }
  },

  stop() {
    if (this._current) {
      this._current.pause();
      this._current.currentTime = 0;
      this._current = null;
    }
  },
};


// ═════════════════════════════════════════════════════════════════════
//  第5部分：试次列表生成
// ═════════════════════════════════════════════════════════════════════

/** Fisher-Yates 洗牌 */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/** 生成图片路径表 */
function buildAssetIndex() {
  const base = CONFIG.ASSETS_BASE;
  const idx = { t1: { have: [], no: [] }, t2: [], digitMap: {} };

  // 含 T 矩阵 (matrix_T_01 ~ matrix_T_20)
  for (let i = 1; i <= 20; i++) {
    const n = String(i).padStart(2, '0');
    idx.t1.have.push(`${base}/images/含T矩阵/matrix_T_${n}.png`);
    idx.t1.no.push(`${base}/images/无T矩阵/matrix_noT_${n}.png`);
  }

  // 数字 (digit_1 ~ digit_9, 不含5)
  const digits = [1,2,3,4,6,7,8,9];
  for (const d of digits) {
    const path = `${base}/images/数字刺激/digit_${d}.png`;
    idx.t2.push(path);
    idx.digitMap[d] = path;
  }

  return idx;
}

const ASSETS = buildAssetIndex();

/** 生成单个试次的参数 */
function makeTrial(audioType, soaMs, hasT, digit) {
  const t1List = hasT ? ASSETS.t1.have : ASSETS.t1.no;
  const t1Img = t1List[Math.floor(Math.random() * t1List.length)];
  const t2Img = ASSETS.digitMap[digit];
  return { audioType, soaMs, hasT, digit, t1Img, t2Img };
}

/** 生成试次列表 */
function generateTrials(audioType, nPerCondition) {
  const trials = [];
  for (const soa of CONFIG.SOA_LEVELS) {
    for (let i = 0; i < nPerCondition; i++) {
      const hasT = Math.random() < 0.5;
      const digits = [1,2,3,4,6,7,8,9];
      const digit = digits[Math.floor(Math.random() * digits.length)];
      trials.push(makeTrial(audioType, soa, hasT, digit));
    }
  }
  return shuffle(trials);
}

function generatePracticeTrials() {
  const n = CONFIG.PRACTICE_TRIALS;
  const trials = [];
  for (let i = 0; i < n; i++) {
    const soa = CONFIG.SOA_LEVELS[i % CONFIG.SOA_LEVELS.length];
    const hasT = Math.random() < 0.5;
    const digits = [1,2,3,4,6,7,8,9];
    const digit = digits[Math.floor(Math.random() * digits.length)];
    trials.push(makeTrial('none', soa, hasT, digit));
  }
  return shuffle(trials);
}


// ═════════════════════════════════════════════════════════════════════
//  第6部分：核心实验 —— 文本屏幕 / 单试次 / Block
// ═════════════════════════════════════════════════════════════════════

function showTextScreen(text, showHint = true) {
  return new Promise(resolve => {
    el.textContent.textContent = text;
    el.textHint.style.display = showHint ? '' : 'none';
    el.textScreen.style.display = 'flex';

    const handler = e => {
      if (e.key === ' ' || e.key === 'Escape') {
        document.removeEventListener('keydown', handler);
        el.textScreen.style.display = 'none';
        if (e.key === 'Escape') {
          AudioController.stop();
          resolve('QUIT');
        } else {
          resolve('OK');
        }
      }
    };
    document.addEventListener('keydown', handler);
  });
}

/** 运行单个试次 */
async function runOneTrial(trial, isPractice = false) {
  hideAllStimuli();
  el.feedbackText.classList.remove('active', 'correct', 'wrong');

  // 设置图片
  setT1Image(trial.t1Img);
  setT2Image(trial.t2Img);

  // 注视点（500~1000ms 随机抖动防预期）
  const fixDuration = CONFIG.FIX_MIN + Math.random() * (CONFIG.FIX_MAX - CONFIG.FIX_MIN);
  show(el.fixation);
  await sleep(fixDuration);
  hide(el.fixation);
  await sleep(50);  // 短暂空白避免视觉残留

  // ====== T1 ONSET ======
  const t1Onset = performance.now();
  show(el.t1);

  // ====== 启动反应收集 ======
  const collector = new ResponseCollector(CONFIG.RESPONSE_TIMEOUT);
  const respPromise = collector.start(t1Onset);

  // ====== T2 ONSET (at SOA) ======
  await sleep(trial.soaMs);
  const t2Onset = performance.now();
  show(el.t2);
  collector.setT2Onset(t2Onset);

  // ====== 刺激关闭时序 ======
  // T1 在 onset 后 350ms 关闭
  const t1Elapsed = performance.now() - t1Onset;
  const t1Remaining = CONFIG.STIM_DURATION_T1 - t1Elapsed;
  if (t1Remaining > 0) await sleep(t1Remaining);
  hide(el.t1);

  // T2 在 onset 后 350ms 关闭
  const t2Elapsed = performance.now() - t2Onset;
  const t2Remaining = CONFIG.STIM_DURATION_T2 - t2Elapsed;
  if (t2Remaining > 0) await sleep(t2Remaining);
  hide(el.t2);

  // ====== 等待反应（2300ms 内完成双任务按键）======
  const responses = await respPromise;

  // ====== 练习反馈 ======
  if (isPractice) {
    const expectedT1 = trial.hasT ? 'f' : 'j';
    const t1Ok = responses.t1 ? (responses.t1.key === expectedT1) : false;
    const isOdd = trial.digit % 2 === 1;
    const expectedT2 = isOdd ? 'f' : 'j';
    const t2Ok = responses.t2 ? (responses.t2.key === expectedT2) : false;

    let fbText = '';
    if (!responses.t1 && !responses.t2) {
      fbText = '未检测到按键，请尽快反应！';
    } else if (!responses.t1) {
      fbText = '任务一（矩阵）未响应！';
    } else if (!responses.t2) {
      fbText = '任务二（数字）未响应！';
    } else if (t1Ok && t2Ok) {
      fbText = '✓ 两个任务都正确！';
    } else if (!t1Ok && !t2Ok) {
      fbText = '✗ 两个任务都错误';
    } else if (!t1Ok) {
      fbText = '✗ 任务一（矩阵）错误';
    } else {
      fbText = '✗ 任务二（数字）错误';
    }

    el.feedbackText.textContent = fbText;
    el.feedbackText.className = 'active ' + (fbText.includes('✓') ? 'correct' : 'wrong');
    await sleep(1000);
    el.feedbackText.classList.remove('active', 'correct', 'wrong');
  }

  // ====== ITI ======
  hideAllStimuli();
  await sleep(CONFIG.ITI);

  // ====== 计算正确性（用于记录） ======
  const expectedT1 = trial.hasT ? 'f' : 'j';
  const t1Correct = responses.t1 ? (responses.t1.key === expectedT1 ? 1 : 0) : 0;
  const isOdd = trial.digit % 2 === 1;
  const expectedT2 = isOdd ? 'f' : 'j';
  const t2Correct = responses.t2 ? (responses.t2.key === expectedT2 ? 1 : 0) : 0;

  return {
    subject: window._subjectId || 'test',
    age: window._subjectAge || '',
    gender: window._subjectGender || '',
    trial: window._trialCounter++,
    blockType: trial.audioType,
    soaMs: trial.soaMs,
    hasT: trial.hasT ? 1 : 0,
    digit: trial.digit,
    t1Img: trial.t1Img.split('/').pop(),
    t2Img: trial.t2Img.split('/').pop(),
    t1Resp: responses.t1 ? responses.t1.key : 'miss',
    t1RtMs: responses.t1 ? Math.round(responses.t1.rt) : '',
    t1Correct,
    t2Resp: responses.t2 ? responses.t2.key : 'miss',
    t2RtMs: responses.t2 ? Math.round(responses.t2.rt) : '',
    t2Correct,
  };
}

/** 运行一个 Block */
async function runBlock(trials, label, isPractice = false) {
  const n = trials.length;
  const blockData = [];

  for (let i = 0; i < n; i++) {
    const pct = ((i + 1) / n * 100).toFixed(0);
    el.statusBar.textContent = `${label}  |  进度 ${i+1}/${n} (${pct}%)`;
    const record = await runOneTrial(trials[i], isPractice);
    blockData.push(record);
    window._allData.push(record);
  }

  el.statusBar.textContent = '';

  // Block 汇总
  const validT2 = blockData.filter(d => d.t2RtMs !== '' && d.t2Correct === 1);
  const t2Rts = validT2.map(d => d.t2RtMs);
  const t1Acc = blockData.reduce((s, d) => s + d.t1Correct, 0) / n * 100;
  const t2Acc = blockData.reduce((s, d) => s + d.t2Correct, 0) / n * 100;
  const t2Mean = t2Rts.length ? t2Rts.reduce((a, b) => a + b, 0) / t2Rts.length : 0;

  await showTextScreen(
    `${label} 完成！\n\n任务一正确率: ${t1Acc.toFixed(1)}%\n任务二正确率: ${t2Acc.toFixed(1)}%\n任务二平均反应时: ${t2Mean.toFixed(0)} ms`
  );
}


// ═════════════════════════════════════════════════════════════════════
//  第7部分：数据导出
// ═════════════════════════════════════════════════════════════════════

function downloadCSV() {
  const fields = [
    'subject','age','gender','trial','blockType','soaMs','hasT','digit',
    't1Img','t2Img','t1Resp','t1RtMs','t1Correct',
    't2Resp','t2RtMs','t2Correct'
  ];
  const rows = window._allData.map(d =>
    fields.map(f => {
      const v = d[f];
      return v === '' ? '' : `"${String(v).replace(/"/g, '""')}"`;
    }).join(',')
  );
  const csv = '﻿' + fields.join(',') + '\n' + rows.join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `PRP_${window._subjectId || 'test'}_${new Date().toISOString().slice(0,19).replace(/[:-]/g,'')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}


// ═════════════════════════════════════════════════════════════════════
//  第8部分：实验总流程
// ═════════════════════════════════════════════════════════════════════

async function runExperiment() {
  window._trialCounter = 1;
  window._allData = [];

  // 从 URL 获取被试编号（支持见数传参）
  const params = new URLSearchParams(window.location.search);
  window._subjectId = params.get('subject_id') || params.get('participant_id') || 'test';

  // 初始化音频
  AudioController.init();

  // 1) 主指导语
  let res = await showTextScreen(CONFIG.INSTRUCTION);
  if (res === 'QUIT') return;

  // 2) 练习说明
  res = await showTextScreen(CONFIG.PRACTICE_INSTRUCTION);
  if (res === 'QUIT') return;

  // 3) 练习（12试次，有反馈）
  const practiceTrials = generatePracticeTrials();
  await runBlock(practiceTrials, '练习', true);
  if (res === 'QUIT') return;

  // 5) 正式实验——Block顺序（被试编号奇偶平衡）
  const num = parseInt(window._subjectId) || 1;
  const isOdd = num % 2 === 1;
  const order = isOdd
    ? [['white_noise', '第一部分（白噪音条件）'],
       ['speech',      '第二部分（单字语音条件）']]
    : [['speech',      '第一部分（单字语音条件）'],
       ['white_noise', '第二部分（白噪音条件）']];

  for (let idx = 0; idx < order.length; idx++) {
    const [audioType, label] = order[idx];
    const trials = generateTrials(audioType, CONFIG.TRIALS_PER_CONDITION);

    // 播放音频
    if (audioType !== 'none') await AudioController.play(audioType);

    await runBlock(trials, label);
    AudioController.stop();

    if (idx < order.length - 1) {
      res = await showTextScreen(CONFIG.BREAK_MSG);
      if (res === 'QUIT') return;
    }
  }

  // 6) 保存 & 结束
  downloadCSV();

  // 向父页面发送数据（iframe 嵌入时用）
  if (window.parent !== window) {
    window.parent.postMessage({
      type: 'experimentData',
      data: window._allData,
      subjectId: window._subjectId,
    }, '*');
  }

  // 统计汇总
  printSummary(window._allData);

  await showTextScreen(CONFIG.END_MSG);
}

/** 控制台打印汇总 */
function printSummary(data) {
  const groups = {};
  for (const d of data) {
    if (d.blockType === 'none') continue;  // 跳过练习
    const key = `${d.blockType}_${d.soaMs}`;
    if (!groups[key]) groups[key] = { t2rt: [], t2c: [], t1c: [] };
    if (d.t2RtMs !== '') groups[key].t2rt.push(d.t2RtMs);
    groups[key].t2c.push(d.t2Correct);
    groups[key].t1c.push(d.t1Correct);
  }

  console.log('\n' + '='.repeat(70));
  console.log('  实验汇总');
  console.log('='.repeat(70));
  console.log('音频类型\tSOA\tT1正确率\tT2正确率\tT2平均RT\tN');
  console.log('-'.repeat(70));

  for (const key of Object.keys(groups).sort()) {
    const g = groups[key];
    const name = key.includes('white_noise') ? '白噪音' : '语音';
    const soa = key.split('_')[1];
    const t1a = (g.t1c.reduce((a,b) => a+b, 0) / g.t1c.length * 100).toFixed(1);
    const t2a = (g.t2c.reduce((a,b) => a+b, 0) / g.t2c.length * 100).toFixed(1);
    const meanRT = g.t2rt.length ? (g.t2rt.reduce((a,b) => a+b, 0) / g.t2rt.length).toFixed(1) : '-';
    console.log(`${name}\tSOA=${soa}ms\t${t1a}%\t${t2a}%\t${meanRT}ms\t${g.t2rt.length}`);
  }
  console.log('='.repeat(70));
}


// ═════════════════════════════════════════════════════════════════════
//  第9部分：入口
// ═════════════════════════════════════════════════════════════════════

// 页面加载完成后弹出被试信息对话框
document.addEventListener('DOMContentLoaded', () => {
  const dialog = document.getElementById('info-dialog');
  const btnStart = document.getElementById('btn-start');
  const inputId = document.getElementById('input-id');
  const inputAge = document.getElementById('input-age');
  const inputGender = document.getElementById('input-gender');

  // 如果 URL 已有 subject_id 参数，自动填入
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('subject_id')) inputId.value = urlParams.get('subject_id');

  // 检查输入是否完整
  function checkForm() {
    btnStart.disabled = !(inputId.value.trim() && inputAge.value && inputGender.value);
  }
  inputId.addEventListener('input', checkForm);
  inputAge.addEventListener('input', checkForm);
  inputGender.addEventListener('change', checkForm);
  checkForm();

  // 点击开始
  btnStart.addEventListener('click', () => {
    window._subjectId = inputId.value.trim();
    window._subjectAge = inputAge.value;
    window._subjectGender = inputGender.value;
    dialog.classList.add('hidden');

    // 请求全屏
    try { document.documentElement.requestFullscreen?.(); } catch(e) {}

    // 启动实验
    setTimeout(runExperiment, 300);
  });

  // 回车提交
  inputGender.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !btnStart.disabled) btnStart.click();
  });
});
</script>
